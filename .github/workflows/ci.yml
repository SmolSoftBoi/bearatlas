name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - name: Install dependencies
        run: yarn install --immutable
      - name: Upload node_modules
        uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: node_modules
      - name: Build
        run: |
          yarn web build
          yarn api build
          docker compose build web
  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules
      - name: Lint
        run: |
          if [ -f package.json ] && node -e "p=require('./package.json');process.exit(!(p.scripts && p.scripts.lint))"; then
            yarn lint
          else
            echo 'skip lint'
          fi

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules
      - name: Test
        run: |
          if [ -f package.json ] && node -e "p=require('./package.json');process.exit(!(p.scripts && p.scripts.test))"; then
            yarn test
          else
            echo 'skip test'
          fi

  e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules
      - name: E2E
        run: |
          if [ -f package.json ] && node -e "p=require('./package.json');process.exit(!(p.scripts && p.scripts.e2e))"; then
            yarn e2e
          else
            echo 'skip e2e'
          fi
